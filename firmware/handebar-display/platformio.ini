[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    bodmer/TFT_eSPI
build_flags =
    -D ST7735_DRIVER
    -D TFT_WIDTH=128
    -D TFT_HEIGHT=128
    -D ST7735_GREENTAB128
    -D TFT_CS=5
    -D TFT_DC=2
    -D TFT_RST=4
    -D SPI_FREQUENCY=27000000
    -D USER_SETUP_LOADED
